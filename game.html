<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Gate Decryptor 2050 - EXTREME+</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2fe;
            --neon-green: #4facfe;
            --neon-red: #ff0055;
            --bg-dark: #00050a;
            --font-main: 'Orbitron', sans-serif;
            --font-sub: 'Rajdhani', sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; background-color: #000;
            font-family: var(--font-sub); color: #fff;
            overflow: hidden;
            background-image: linear-gradient(rgba(0, 242, 254, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 242, 254, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .mobile-device {
            width: 90vw; max-width: 400px; height: 85vh; max-height: 800px;
            background: rgba(10, 25, 40, 0.95); border: 2px solid rgba(0, 242, 254, 0.3);
            border-radius: 40px; padding: 20px; display: flex; flex-direction: column;
            box-shadow: 0 0 50px rgba(0, 242, 254, 0.2); position: relative;
        }

        .status-header {
            display: flex; justify-content: space-between; padding: 20px 10px;
            font-family: var(--font-main); font-size: 10px; letter-spacing: 1px;
        }

        .life-display { color: var(--neon-red); text-shadow: 0 0 8px var(--neon-red); }

        .title-section { text-align: center; margin-bottom: 30px; }
        h1 { font-family: var(--font-main); font-size: 18px; margin: 0; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }
        .subtitle { font-size: 9px; opacity: 0.6; margin-top: 5px; }

        .game-main { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 40px; }

        .gauge-wrapper { width: 100%; height: 100px; display: flex; align-items: center; justify-content: center; position: relative; }

        #gauge-bar { width: 100%; height: 6px; background: rgba(255, 255, 255, 0.1); border-radius: 3px; position: relative; }

        #safety-zone {
            position: absolute; height: 250%; top: -75%; background: rgba(0, 242, 254, 0.15);
            left: 50%; transform: translateX(-50%); border-left: 2px solid var(--neon-blue); border-right: 2px solid var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
        }

        #pointer {
            position: absolute; width: 4px; height: 60px; background: #fff;
            top: 50%; transform: translateY(-50%); box-shadow: 0 0 15px #fff, 0 0 5px var(--neon-blue);
            border-radius: 2px; z-index: 10;
        }

        #message { font-family: var(--font-main); font-size: 14px; height: 20px; text-align: center; }

        .controls { padding-bottom: 30px; display: flex; justify-content: center; }

        #action-btn {
            width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--neon-blue);
            background: transparent; color: var(--neon-blue); font-family: var(--font-main);
            font-weight: bold; font-size: 14px; cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.2); transition: all 0.1s;
            display: flex; align-items: center; justify-content: center;
        }

        #action-btn:active { transform: scale(0.9); background: rgba(0, 242, 254, 0.2); box-shadow: 0 0 40px rgba(0, 242, 254, 0.5); }

        .success { color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }
        .fail { color: var(--neon-red); text-shadow: 0 0 10px var(--neon-red); }
    </style>
</head>
<body>

<div class="mobile-device">
    <div class="status-header">
        <div>LAYER: <span id="stg">1</span>/5</div>
        <div id="lives" class="life-display">💎💎💎💎💎</div>
    </div>

    <div class="title-section">
        <h1>GATE DECRYPTOR</h1>
        <div class="subtitle">SECURITY LEVEL: EXTREME+</div>
    </div>

    <div class="game-main">
        <div id="message">READY TO SYNC</div>
        <div class="gauge-wrapper">
            <div id="gauge-bar">
                <div id="safety-zone"></div>
                <div id="pointer"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="action-btn">START</button>
    </div>
</div>

<script>
    const pointer = document.getElementById('pointer');
    const safetyZone = document.getElementById('safety-zone');
    const stgDisp = document.getElementById('stg');
    const lifeDisp = document.getElementById('lives');
    const msgDisp = document.getElementById('message');
    const btn = document.getElementById('action-btn');

    let stg = 1;
    let lives = 5;
    let pos = 0;
    let dir = 1;
    let active = false;
    let gameState = 'START'; // START, PLAYING, GAMEOVER, CLEAR
    let loopId = null;

    // 難易度設定 (SPEED UP + ZONE DOWN)
    const levels = {
        1: { s: 1.5, w: 30 },
        2: { s: 2.5, w: 22 },
        3: { s: 4.0, w: 15 },
        4: { s: 6.0, w: 10 },
        5: { s: 8.5, w: 6 }
    };

    // 音声エンジン
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;

        if (type === 'hit') {
            osc.type = 'square'; osc.frequency.setValueAtTime(600, now);
            gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(); osc.stop(now + 0.1);
        } else if (type === 'success') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(880, now);
            gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.2);
            osc.start(); osc.stop(now + 0.2);
        } else if (type === 'fail') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, now);
            gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.3);
            osc.start(); osc.stop(now + 0.3);
        }
    }

    function update() {
        stgDisp.innerText = stg;
        lifeDisp.innerText = "💎".repeat(lives) + "🖤".repeat(5 - lives);
        safetyZone.style.width = levels[stg].w + '%';
    }

    function run() {
        if (active) {
            pos += levels[stg].s * dir;
            if (pos >= 100) { pos = 100; dir = -1; }
            if (pos <= 0) { pos = 0; dir = 1; }
            pointer.style.left = pos + '%';
            loopId = requestAnimationFrame(run);
        }
    }

    function handleTrigger() {
        if (gameState === 'START' || gameState === 'GAMEOVER' || gameState === 'CLEAR') {
            resetGame();
            return;
        }

        if (!active) return;
        playSound('hit');

        const w = levels[stg].w;
        if (pos >= 50 - w/2 && pos <= 50 + w/2) {
            // 成功
            active = false;
            cancelAnimationFrame(loopId);
            if (stg < 5) {
                playSound('success');
                msgDisp.innerText = "LAYER " + stg + " UNLOCKED";
                msgDisp.className = "success";
                stg++;
                setTimeout(() => {
                    update(); pos = 0; dir = 1; pointer.style.left = '0%';
                    active = true; msgDisp.innerText = "SYNCING..."; msgDisp.className = "";
                    run();
                }, 500);
            } else {
                gameState = 'CLEAR';
                msgDisp.innerText = "GATE OPENED";
                msgDisp.className = "success";
                btn.innerText = "REBOOT";
            }
        } else {
            // 失敗
            playSound('fail');
            lives--;
            update();
            if (lives <= 0) {
                active = false;
                gameState = 'GAMEOVER';
                msgDisp.innerText = "SYSTEM LOCKED";
                msgDisp.className = "fail";
                btn.innerText = "RETRY";
            } else {
                msgDisp.innerText = "SYNC ERROR";
                msgDisp.className = "fail";
                active = false;
                setTimeout(() => {
                    if (lives > 0) {
                        active = true; msgDisp.innerText = "SYNCING..."; msgDisp.className = "";
                        run();
                    }
                }, 300);
            }
        }
    }

    function resetGame() {
        stg = 1; lives = 5; pos = 0; dir = 1;
        gameState = 'PLAYING';
        active = true;
        btn.innerText = "EXECUTE";
        msgDisp.innerText = "SYNCING...";
        msgDisp.className = "";
        update();
        run();
    }

    // イベントリスナーの修正
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); handleTrigger(); }, {passive: false});
    btn.addEventListener('mousedown', (e) => { 
        if (!('ontouchstart' in window)) handleTrigger(); 
    });
    window.addEventListener('keydown', (e) => { if(e.code === 'Space') handleTrigger(); });

    update();
</script>
</body>
</html>
