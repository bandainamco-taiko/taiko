<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>音の足跡、記憶の鼓動</title>
    <link href="https://fonts.googleapis.com/css2?family=Sawarabi+Mincho&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyber-blue: #00f2ff;
            --wa-indigo: rgba(13, 27, 42, 0.95);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100vh; height: 100dvh; 
            background-color: #000; color: #ffffff;
            font-family: 'Sawarabi Mincho', serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; 
            overscroll-behavior: none; /* 画面のバウンス防止 */
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none; -webkit-user-select: none;
        }

        #game-container {
            position: relative; width: 100%; max-width: 500px; height: 100%;
            background-color: #050505; display: none; flex-direction: column; 
            box-sizing: border-box; overflow: hidden;
        }

        #menu-bar {
            position: absolute; 
            top: env(safe-area-inset-top, 20px); 
            padding-top: 10px;
            left: 0; right: 0; z-index: 6000;
            display: flex; gap: 8px; justify-content: flex-end; padding-right: 15px;
            pointer-events: none;
        }
        .menu-btn {
            pointer-events: auto;
            background: rgba(0, 20, 40, 0.9); border: 1px solid var(--cyber-blue);
            color: var(--cyber-blue); padding: 8px 12px; cursor: pointer;
            font-size: 0.7rem; font-weight: bold; border-radius: 4px;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.4);
        }

        #fader {
            position: absolute; inset: 0; background: #000; 
            z-index: 8000; opacity: 0; pointer-events: none;
            transition: opacity 1.5s ease-in-out;
        }
        #fader.active { opacity: 1; pointer-events: auto; }

        #video-layer {
            position: absolute; inset: 0; z-index: 4000; display: none;
            background: #000; justify-content: center; align-items: center;
        }
        #ending-video { width: 100%; height: 100%; object-fit: cover; }

        #bg-area {
            flex: 1; width: 100%; background-image: url('img/haikei01.png'); 
            background-size: cover; background-position: center; position: relative; overflow: hidden;
        }
        .chara-stand { position: absolute; z-index: 2; display: none; filter: drop-shadow(0 0 15px #000); pointer-events: none; }
        .human-stand { height: 82%; bottom: -5px; left: 50%; transform: translateX(-50%); }
        .mascot-stand { height: 35%; bottom: 12%; left: auto; right: 25px; transform: none; }

        #msg-window {
            height: 32%; width: 100%; background: var(--wa-indigo); border-top: 2px solid var(--cyber-blue);
            padding: 20px 25px calc(25px + env(safe-area-inset-bottom, 20px)); 
            box-sizing: border-box; cursor: pointer; z-index: 5; position: relative; display: none;
        }
        #message-text { font-size: 1rem; line-height: 1.6; letter-spacing: 0.05em; white-space: pre-wrap; }

        .overlay-screen { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; background: radial-gradient(circle, #0d1b2a, #000); padding: 20px; }
        .pw-input { background: rgba(0, 242, 255, 0.1); border: 1px solid var(--cyber-blue); color: #fff; padding: 12px; font-size: 1.2rem; text-align: center; margin-bottom: 20px; width: 80%; outline: none; border-radius: 0; -webkit-appearance: none; }
        h1 { font-size: 1.8rem; text-shadow: 0 0 15px var(--cyber-blue); margin-bottom: 30px; text-align: center; line-height: 1.4; }
        .btn-cyber { padding: 12px 35px; font-size: 1.1rem; background: transparent; color: var(--cyber-blue); border: 1px solid var(--cyber-blue); cursor: pointer; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%); }

        .flash-red { animation: flash 0.3s ease-out; }
        @keyframes flash { 0% { background-color: rgba(255, 0, 0, 0.6); } 100% { background-color: transparent; } }

        #log-screen {
            position: absolute; inset: 0; background: rgba(0, 0, 0, 0.98);
            z-index: 9000; display: none; flex-direction: column; padding: 60px 20px 40px;
        }
        #log-content { flex: 1; overflow-y: auto; margin-bottom: 20px; font-size: 0.9rem; line-height: 1.8; -webkit-overflow-scrolling: touch; }
        .log-item { margin-bottom: 15px; border-bottom: 1px solid rgba(0, 242, 255, 0.2); padding-bottom: 8px; }
        .log-name { color: var(--cyber-blue); font-weight: bold; }
    </style>
</head>
<body>

<audio id="bgm" src="music/intro.mp3" loop preload="auto"></audio>
<div id="fader"></div>

<div id="password-screen" class="overlay-screen">
    <p style="letter-spacing: 0.2em; font-size: 0.7rem; color: var(--cyber-blue); margin-bottom:10px;">SYSTEM STATUS: ENCRYPTED</p>
    <input type="password" id="pw-field" class="pw-input" placeholder="PASSCODE" inputmode="numeric">
    <button class="btn-cyber" onclick="checkPassword()">認証</button>
</div>

<div id="game-container">
    <div id="video-layer">
        <video id="ending-video" src="img/opening.mp4" playsinline webkit-playsinline preload="auto"></video>
    </div>

    <div id="menu-bar">
        <button class="menu-btn" onclick="openLog()">LOG</button>
        <button class="menu-btn" id="save-btn" onclick="manualSave()">SAVE</button>
        <button class="menu-btn" id="mute-btn" onclick="toggleMute()">🔊</button>
        <button class="menu-btn" onclick="resetGame()">RESET</button>
    </div>

    <div id="log-screen">
        <h2 style="color: var(--cyber-blue); border-bottom: 1px solid; margin-bottom: 20px; font-size: 1.2rem;">BACK LOG</h2>
        <div id="log-content"></div>
        <button class="btn-cyber" onclick="closeLog()">CLOSE</button>
    </div>

    <div id="title-screen" class="overlay-screen">
        <h1>音の足跡、<br>記憶の鼓動</h1>
        <button class="btn-cyber" id="start-btn" onclick="startGame()">START</button>
    </div>

    <div id="bg-area">
        <div id="effect-layer" style="position:absolute; inset:0; pointer-events:none; z-index:3;"></div>
        <img id="haruto-stand" class="chara-stand human-stand" src="img/haruto01.png" alt="Haruto">
        <img id="kage-stand" class="chara-stand human-stand" src="img/kage01.png" alt="Kage">
        <img id="kodou-stand" class="chara-stand mascot-stand" src="img/kodou01.png" alt="Kodou">
    </div>

    <div id="msg-window" onclick="nextScene()">
        <div id="speaker-name" style="font-weight:bold; color:var(--cyber-blue); margin-bottom:8px; padding-left:22px; position:relative;"></div>
        <div id="message-text"></div>
    </div>
</div>

<script>
    const SECRET_KEY = "2026"; 
    const bgm = document.getElementById('bgm');
    const fader = document.getElementById('fader');
    const videoLayer = document.getElementById('video-layer');
    const endingVideo = document.getElementById('ending-video');

    let currentStep = 0;
    let isTyping = false;
    let isTransitioning = false; // 二重呼び出し防止
    let typingTimer;
    let chatHistory = []; 

    const scenario = [
        { name: "ハルト", text: "「……OSAKA。ネオンの海と、牙を剥くようなテック（技術）がひしめき合う、僕の街」", chara: "none", bg: "haikei01", effect: "none" },
        { name: "システム", text: "（画面、街の雑踏と、和楽器の音が混ざり合う独特な喧騒を映し出す）", chara: "none", bg: "haikei01", effect: "none" },
        { name: "ハルト", text: "「ここでは、誰もが『最強の音』を求めている。魂を揺さぶるリズム、世界を変える周波数。……でも、僕が求めているのは、もっと別のものだ」", chara: "haruto", bg: "haikei01", effect: "none" },
        { name: "システム", text: "（ハルト、隣に浮かぶコドウを、愛おしそうに観つめる）", chara: "haruto_kodou", bg: "haikei01", effect: "none" },
        { name: "ハルト", text: "「こいつは『コドウ』。……お父さんが、宇宙へ行く前に僕にくれた、特別な相棒」", chara: "haruto_kodou", bg: "haikei01", effect: "none" },
        { name: "コドウ", text: "「（和風な電子音で）ドン！ ハルト、今日の調子はどう？」", chara: "kodou", bg: "haikei01", effect: "none" },
        { name: "ハルト", text: "「（フッと笑う）絶好調だよ、コドウ。……お父さんが帰ってくるまでに、お前を世界一のロボットにして、びっくりさせてやるんだ」", chara: "haruto_kodou", bg: "haikei01", effect: "none" },
        { name: "システム", text: "（ハルト、ヘッドホンを装着し、端末を取り出す）", chara: "haruto", bg: "haikei01", effect: "none" },
        { name: "ハルト", text: "「さあ、始めよう。……僕たちの、新しいリズムを創り出す、特別なメンテナンスを」", chara: "haruto_kodou", bg: "haikei01", effect: "none" },
        { name: "ハルト", text: "「……よし。父さんのマニュアル通りなら、これで処理速度が上がるはずだ。……いけっ！」", chara: "haruto_kodou", bg: "bg_haruto_room", effect: "none" },
        { name: "システム", text: "（画面フラッシュ ＆ エラーSE音演出）", chara: "none", bg: "bg_haruto_room", effect: "error" },
        { name: "ハルト", text: "「え……？ コドウ……？ 嘘だろ、待ってよ……！」", chara: "haruto", bg: "bg_haruto_room", effect: "none" },
        { name: "ハルト", text: "「ごめん、僕が余計なことを……っ！」", chara: "haruto", bg: "bg_haruto_room", effect: "none" },
        { name: "システム", text: "（カゲの立ち絵が登場）", chara: "none", bg: "bg_haruto_room", effect: "none" },
        { name: "ハルト", text: "「誰だ！？ コドウに触るな！」", chara: "haruto", bg: "bg_haruto_room", effect: "none" },
        { name: "正体不明の男", text: "「……静かにしてくれ。……急がなければ。」", chara: "kage", bg: "bg_haruto_room", effect: "none" },
        { name: "システム", text: "（正体不明の男が消える）", chara: "none", bg: "bg_haruto_room", effect: "none" },
        { name: "ハルト", text: "「待てよ！ 返せ！ 泥棒！！ \n……あ、あいつ、メインバッテリーを外したまま連れてった……。\nGPSの信号が消える前に、早く追いかけないと！」", chara: "haruto", bg: "bg_haruto_room", effect: "none" }
    ];

    function checkPassword() {
        if (document.getElementById('pw-field').value === SECRET_KEY) {
            document.getElementById('password-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            loadGame(); 
        } else { alert("認証エラー"); }
    }

    function startGame() {
        document.getElementById('title-screen').style.display = 'none';
        document.getElementById('msg-window').style.display = 'block';
        bgm.volume = 1.0; 
        bgm.play().catch(e => { console.log("Audio play blocked"); });
        showText();
    }

    function fadeOutBGM(callback) {
        const interval = 50;
        const step = 0.05; 
        let timer = setInterval(() => {
            if (bgm.volume > step) bgm.volume -= step;
            else {
                bgm.volume = 0; bgm.pause(); clearInterval(timer);
                if (callback) callback();
            }
        }, interval);
    }

    function playOpeningVideo() {
        if (isTransitioning) return;
        isTransitioning = true;

        endingVideo.muted = true;
        endingVideo.play().then(() => {
            fader.classList.add('active');
            fadeOutBGM(() => {
                setTimeout(() => {
                    videoLayer.style.display = 'flex';
                    videoLayer.style.opacity = '1';
                    endingVideo.muted = false;
                    endingVideo.currentTime = 0;
                    fader.classList.remove('active');
                }, 1000);
            });
        }).catch(e => {
            console.log("Video restriction", e);
            showEndingImage();
        });

        endingVideo.onended = () => {
            fader.classList.add('active');
            setTimeout(() => {
                videoLayer.style.display = 'none';
                showEndingImage();
            }, 1500);
        };
    }

    function showEndingImage() {
        const endLayer = document.createElement('div');
        endLayer.style.cssText = "position:absolute; inset:0; z-index:4500; background-color:#000; display:flex; justify-content:center; align-items:center;";
        const endImg = document.createElement('div');
        endImg.style.cssText = "width:100%; height:100%; background-image:url('img/opening01.png'); background-size:cover; background-position:center; cursor:pointer; opacity:0; transition:opacity 2.5s ease-in-out;";
        
        endImg.onclick = () => {
            bgm.volume = 1.0;
            alert("つづく... 第2章、近日公開！");
        };

        endLayer.appendChild(endImg);
        document.getElementById('game-container').appendChild(endLayer);
        setTimeout(() => {
            fader.classList.remove('active');
            endImg.style.opacity = '1';
        }, 800);
    }

    function saveGame() {
        localStorage.setItem('cyber_puzzle_save', JSON.stringify({ 
            step: currentStep, history: chatHistory, muted: bgm.muted 
        }));
    }

    function loadGame() {
        const saved = localStorage.getItem('cyber_puzzle_save');
        if (saved) {
            const data = JSON.parse(saved);
            if (data.step < scenario.length) {
                currentStep = data.step;
                chatHistory = data.history || [];
                bgm.muted = data.muted;
                document.getElementById('mute-btn').innerText = bgm.muted ? "🔇" : "🔊";
                document.getElementById('start-btn').innerText = "CONTINUE";
            }
        }
    }

    function resetGame() { if (confirm("最初からやり直しますか？")) { localStorage.removeItem('cyber_puzzle_save'); location.reload(); } }

    function openLog() {
        const logContent = document.getElementById('log-content');
        logContent.innerHTML = chatHistory.map(h => `<div class="log-item"><div class="log-name">${h.name}</div><div class="log-text">${h.text}</div></div>`).join('');
        document.getElementById('log-screen').style.display = 'flex';
    }
    function closeLog() { document.getElementById('log-screen').style.display = 'none'; }

    function showText() {
        const data = scenario[currentStep];
        const nameEl = document.getElementById('speaker-name');
        const textEl = document.getElementById('message-text');
        chatHistory.push({ name: data.name, text: data.text });
        nameEl.innerText = (data.name === "システム") ? "" : data.name;
        nameEl.style.display = (data.name === "システム") ? "none" : "block";
        textEl.innerText = ""; isTyping = true;
        updateVisuals(data); saveGame();

        let i = 0; clearInterval(typingTimer);
        typingTimer = setInterval(() => {
            if (i < data.text.length) { textEl.innerText += data.text.charAt(i); i++; }
            else { clearInterval(typingTimer); isTyping = false; }
        }, 40);
    }

    function updateVisuals(data) {
        const hImg = document.getElementById('haruto-stand');
        const kImg = document.getElementById('kage-stand');
        const dImg = document.getElementById('kodou-stand');
        const bgArea = document.getElementById('bg-area');
        hImg.style.display = "none"; kImg.style.display = "none"; dImg.style.display = "none";
        if (data.chara === "haruto") hImg.style.display = "block";
        else if (data.chara === "kage") kImg.style.display = "block";
        else if (data.chara === "kodou") dImg.style.display = "block";
        else if (data.chara === "haruto_kodou") { hImg.style.display = "block"; dImg.style.display = "block"; }
        if (data.bg) bgArea.style.backgroundImage = `url('img/${data.bg}.png')`;
        if (data.effect === "error") {
            const el = document.getElementById('effect-layer');
            el.classList.add('flash-red');
            setTimeout(() => el.classList.remove('flash-red'), 300);
        }
    }

    function nextScene() {
        if (isTyping) {
            clearInterval(typingTimer);
            document.getElementById('message-text').innerText = scenario[currentStep].text;
            isTyping = false; return;
        }
        currentStep++;
        if (currentStep < scenario.length) showText();
        else playOpeningVideo();
    }

    function toggleMute() { bgm.muted = !bgm.muted; document.getElementById('mute-btn').innerText = bgm.muted ? "🔇" : "🔊"; saveGame(); }
</script>

</body>
</html>
