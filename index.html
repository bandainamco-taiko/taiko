<!DOCTYPE html>
<html lang="ja">
<head>
    <meta name="robots" content="noindex,nofollow">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>音の足跡、記憶の鼓動</title>
    <style>
        :root {
            --cyber-blue: #00f2ff;
            --cyber-pink: #ff00ff;
            --wa-indigo: #0d1b2a; /* 不透明 */
            --msg-window-height: 32dvh;
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100dvh; background-color: #000; color: #ffffff; font-family: "Sawarabi Mincho", serif; display: flex; justify-content: center; align-items: center; overflow: hidden; touch-action: none; }
        #game-container { position: relative; width: 100%; max-width: 500px; height: 100%; background-color: #050505; display: none; flex-direction: column; box-sizing: border-box; }
        
        #menu-bar { position: absolute; top: 45px; left: 0; right: 0; z-index: 6000; display: flex; gap: 5px; justify-content: flex-end; padding: 0 10px; }
        .menu-btn { background: rgba(0, 20, 40, 0.9); border: 1px solid var(--cyber-blue); color: var(--cyber-blue); padding: 8px 10px; cursor: pointer; font-size: 0.65rem; font-weight: bold; border-radius: 4px; box-shadow: 0 0 10px rgba(0, 242, 255, 0.4); font-family: sans-serif; }
        .btn-note { border-color: var(--cyber-pink); color: var(--cyber-pink); }
        .btn-hint { border-color: #ffea00; color: #ffea00; }
        
        #fader { position: absolute; inset: 0; background: #000; z-index: 8000; opacity: 0; pointer-events: none; transition: opacity 1.5s ease; }
        #fader.active { opacity: 1; pointer-events: auto; }
        #bg-area { flex: 1; width: 100%; background-image: url('img/haikei01.jpg'); background-size: cover; background-position: center; position: relative; overflow: hidden; }
        
        .chara-stand { position: absolute; z-index: 2; display: none; filter: drop-shadow(0 0 15px #000); pointer-events: none; bottom: var(--msg-window-height); }
        .human-stand { height: 60dvh !important; left: 50%; transform: translateX(-50%); margin-bottom: -10px; }
        .mascot-stand { height: 30dvh !important; bottom: calc(var(--msg-window-height) + 2dvh); right: 20px; left: auto; z-index: 3; }
        .boy-stand { height: 50dvh !important; left: 50%; transform: translateX(-50%); margin-bottom: -5px; }
        .drone-stand { height: 20dvh !important; top: 20dvh; bottom: auto; left: 20px; }

        #gps-layer { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); z-index: 10; display: none; flex-direction: column; align-items: center; pointer-events: none; }
        .radar { position: relative; width: 220px; height: 220px; border: 2px solid var(--cyber-blue); border-radius: 50%; background-color: #050a10; background-image: radial-gradient(circle, rgba(0, 242, 255, 0.1) 0%, rgba(0, 0, 0, 0.8) 85%); overflow: hidden; box-shadow: 0 0 20px rgba(0, 242, 255, 0.3); }
        .radar-map-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px); background-size: 20px 20px; background-position: center; }
        .map-road { position: absolute; background: rgba(0, 242, 255, 0.15); }
        .road-main { top: 0; left: 40%; width: 20px; height: 100%; transform: rotate(10deg); }
        .road-sub { top: 55%; left: 0; width: 100%; height: 12px; transform: rotate(-5deg); }
        .map-building { position: absolute; background: rgba(0, 242, 255, 0.1); border: 1px solid rgba(0, 242, 255, 0.3); }
        .b-1 { top: 20%; left: 15%; width: 40px; height: 50px; }
        .b-2 { top: 15%; left: 65%; width: 30px; height: 70px; }
        .b-3 { top: 45%; left: 45%; width: 45px; height: 25px; }
        .b-4 { top: 75%; left: 20%; width: 35px; height: 35px; }
        .radar-location-name { position: absolute; top: 58%; left: 50%; transform: translate(-50%, -50%); color: var(--cyber-blue); font-family: sans-serif; font-size: 0.8rem; font-weight: 900; letter-spacing: 0.1em; text-shadow: 0 0 8px var(--cyber-blue); z-index: 6; }
        .radar-sweep { position: absolute; inset: 0; background: conic-gradient(from 0deg, transparent 70%, rgba(0, 242, 255, 0.2) 100%); animation: rotate-radar 4s linear infinite; }
        .radar-target { position: absolute; top: 62%; left: 52%; width: 10px; height: 10px; background-color: var(--cyber-pink); border-radius: 50%; box-shadow: 0 0 15px var(--cyber-pink); animation: blink-target 1s infinite; z-index: 7; }
        @keyframes rotate-radar { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes blink-target { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.2); } }

        #msg-window { height: var(--msg-height); width: 100%; background: var(--wa-indigo); border-top: 2px solid var(--cyber-blue); padding: 20px 25px; box-sizing: border-box; cursor: pointer; z-index: 5; position: absolute; bottom: 0; left: 0; display: none; }
        #speaker-name { font-weight:bold; color:var(--cyber-blue); margin-bottom:8px; height:1.2em; font-family: sans-serif; font-size: 0.9rem; }
        #message-text { font-size: 1rem; line-height: 1.6; white-space: pre-wrap; }
        
        .full-overlay { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.98); z-index: 9500; display: none; flex-direction: column; padding: 60px 25px; }
        #input-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.95); z-index: 7000; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        #input-field { background: rgba(0, 242, 255, 0.1); border: 1px solid var(--cyber-blue); color: #fff; padding: 12px; text-align: center; margin-bottom: 20px; width: 80%; font-size: 1.2rem; }
        .btn-cyber { padding: 12px 35px; background: transparent; color: var(--cyber-blue); border: 1px solid var(--cyber-blue); cursor: pointer; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%); font-weight: bold; }
        .flash-red { animation: fr 0.3s ease; } @keyframes fr { 0% { background: rgba(255,0,0,0.5); } 100% { background: transparent; } }
        .flash-green { animation: fg 0.4s ease; } @keyframes fg { 0% { background: rgba(0,255,170,0.5); } 100% { background: transparent; } }
    </style>
</head>
<body onload="initGame()">

<audio id="bgm" src="music/intro.mp3" loop></audio>
<div id="fader"></div>

<div id="game-container">
    <div id="menu-bar">
        <button class="menu-btn btn-hint" onclick="window.open('hint.html', '_blank')">💡 HINT</button>
        <button class="menu-btn btn-note" onclick="openNote()">📓 NOTE</button>
        <button class="menu-btn" onclick="openLog()">LOG</button>
        <button class="menu-btn" id="mute-btn" onclick="toggleMute()">🔊</button>
        <button class="menu-btn" onclick="resetGame()">RESET</button>
    </div>

    <div id="note-screen" class="full-overlay">
        <h2 style="color:var(--cyber-pink); border-bottom:1px solid var(--cyber-pink); padding-bottom:10px;">DEVELOPER NOTE</h2>
        <div id="note-content" style="flex:1; overflow-y:auto; margin-bottom:20px;"></div>
        <button class="btn-cyber" onclick="closeNote()">CLOSE</button>
    </div>

    <div id="log-screen" class="full-overlay">
        <h2>BACK LOG</h2>
        <div id="log-content" style="flex:1; overflow-y:auto; margin-bottom:20px;"></div>
        <button class="btn-cyber" onclick="closeLog()">CLOSE</button>
    </div>
    
    <div id="title-screen" style="position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; background: #000;">
        <h1 style="font-size: 1.8rem; text-align: center; margin-bottom: 30px; text-shadow: 0 0 10px var(--cyber-blue);">音の足跡、<br>記憶の鼓動</h1>
        <button class="btn-cyber" onclick="startGame()">START</button>
    </div>

    <div id="bg-area">
        <div id="effect-layer" style="position:absolute; inset:0; pointer-events:none; z-index:3;"></div>
        <div id="gps-layer">
            <div class="radar">
                <div class="radar-map-grid"></div><div class="map-road road-main"></div><div class="map-road road-sub"></div><div class="map-building b-1"></div><div class="map-building b-2"></div><div class="map-building b-3"></div><div class="map-building b-4"></div>
                <div class="radar-location-name" id="loc-text"></div>
                <div class="radar-sweep"></div>
                <div class="radar-target"></div>
            </div>
        </div>
        <img id="haruto-stand" class="chara-stand human-stand" src="img/haruto01.png">
        <img id="kage-stand" class="chara-stand human-stand" src="img/kage01.png">
        <img id="kodou-stand" class="chara-stand mascot-stand" src="img/kodou01.png">
        <img id="boy-stand" class="chara-stand boy-stand" src="img/donda.png"> 
        <img id="drone-stand" class="chara-stand drone-stand" src="img/doron.png">
    </div>

    <div id="msg-window" onclick="handleWindowClick()">
        <div id="speaker-name"></div>
        <div id="message-text"></div>
    </div>

    <div id="input-overlay">
        <p id="input-guide" style="color:var(--cyber-blue); margin-bottom:15px; text-align:center;"></p>
        <input type="text" id="input-field" autocomplete="off" onkeydown="if(event.key==='Enter')submitInput()">
        <button class="btn-cyber" onclick="submitInput()">認証</button>
    </div>
</div>

<script>
    const bgm = document.getElementById('bgm');
    const fader = document.getElementById('fader');
    const gpsLayer = document.getElementById('gps-layer');
    let currentStep = 0, isTyping = false, typingTimer, chatHistory = [], unlockedNotes = [];
    let waitingForClickInput = false;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSynthSound(type) {
        if (bgm.muted) return;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination); const now = audioCtx.currentTime;
        if (type === 'taiko') { osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(0.01, now + 0.5); gain.gain.setValueAtTime(0.5, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5); osc.start(); osc.stop(now + 0.5); }
        else if (type === 'error') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(110, now); gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 0.3); osc.start(); osc.stop(now + 0.3); }
        else if (type === 'success') { osc.frequency.setValueAtTime(880, now); osc.frequency.setValueAtTime(1100, now + 0.1); gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2); osc.start(); osc.stop(now + 0.2); }
    }

    function initGame() { 
        document.getElementById('game-container').style.display = 'flex'; 
        loadGame();
    }

    function startGame() { 
        document.getElementById('title-screen').style.display = 'none'; 
        document.getElementById('msg-window').style.display = 'block'; 
        if(audioCtx.state === 'suspended') audioCtx.resume(); 
        bgm.play().catch(()=>{}); 
        showText(); 
    }

    function showText() {
        if (currentStep >= scenario.length) return;
        const data = scenario[currentStep];
        saveGame();
        if (bgm.paused) bgm.play().catch(()=>{});
        if (data.note && !unlockedNotes.some(n => n.id === data.note.id)) unlockedNotes.push(data.note);
        if (data.name === "コドウ" || (data.text && data.text.includes("ドン"))) playSynthSound('taiko');
        
        const nameEl = document.getElementById('speaker-name'), textEl = document.getElementById('message-text');
        chatHistory.push({ name: data.name, text: data.text });
        nameEl.innerText = (["システム", "駅アナウンス", "システム音声", "警備ドローン", "システム音声（警告）", "ドローン", "ヤタガラス"].includes(data.name)) ? "" : data.name;
        textEl.innerText = ""; isTyping = true;
        updateVisuals(data);

        let i = 0; clearInterval(typingTimer);
        typingTimer = setInterval(() => {
            if (i < data.text.length) { textEl.innerText += data.text.charAt(i++); }
            else { 
                clearInterval(typingTimer); isTyping = false; 
                waitingForClickInput = true;
            }
        }, 40);
    }

    function handleWindowClick() {
        const data = scenario[currentStep];
        if (isTyping) { 
            clearInterval(typingTimer); 
            document.getElementById('message-text').innerText = data.text; 
            isTyping = false; 
            waitingForClickInput = true; 
            return; 
        }
        
        if (waitingForClickInput) {
            waitingForClickInput = false;
            if (data.input) { showInputUI(data.input); return; }
            if (data.jump) { window.location.href = data.jump; return; }
            if (data.videoTrigger) { fader.classList.add('active'); setTimeout(() => { window.location.href = "video.html"; }, 1500); return; }
            if (data.endingTrigger) { fader.classList.add('active'); setTimeout(() => { window.location.href = "ending.html"; }, 1500); return; }
            
            currentStep++; 
            showText();
        }
    }

    function showInputUI(config) { document.getElementById('input-overlay').style.display = 'flex'; document.getElementById('input-field').value = ""; document.getElementById('input-field').focus(); document.getElementById('input-guide').innerText = config.guide; }
    function submitInput() {
        const val = document.getElementById('input-field').value.trim(); const config = scenario[currentStep].input;
        if (val === config.ans) { playSynthSound('success'); document.getElementById('input-overlay').style.display = 'none'; currentStep++; showText(); }
        else { playSynthSound('error'); alert("認証エラー。"); if (config.onMissStep !== undefined && val === "きどう") { document.getElementById('input-overlay').style.display = 'none'; currentStep = config.onMissStep; showText(); } }
    }

    function updateVisuals(data) {
        // 画像形式（jpg/png）の指定に対応
        if (data.bg) document.getElementById('bg-area').style.backgroundImage = `url('img/${data.bg}.jpg')`;
        if (data.bg_png) document.getElementById('bg-area').style.backgroundImage = `url('img/${data.bg_png}.png')`;
        
        document.getElementById('haruto-stand').style.display = (data.chara === "haruto" || data.chara === "haruto_kodou") ? "block" : "none";
        document.getElementById('kage-stand').style.display = (data.chara === "kage") ? "block" : "none";
        document.getElementById('kodou-stand').style.display = (data.chara === "kodou" || data.chara === "haruto_kodou") ? "block" : "none";
        document.getElementById('boy-stand').style.display = (data.chara === "boy") ? "block" : "none"; 
        document.getElementById('drone-stand').style.display = (data.chara === "drone") ? "block" : "none";

        gpsLayer.style.display = (data.effect === "gps") ? "flex" : "none";
        if (data.loc) document.getElementById('loc-text').innerText = data.loc;
        const eff = document.getElementById('effect-layer');
        if (data.effect === "error") { eff.classList.add('flash-red'); playSynthSound('error'); setTimeout(()=>eff.classList.remove('flash-red'), 300); }
        if (data.effect === "success") { eff.classList.add('flash-green'); playSynthSound('success'); setTimeout(()=>eff.classList.remove('flash-green'), 400); }
    }

    function openNote() { const content = unlockedNotes.map(n => `<div style="border-bottom:1px solid #333; padding:10px 0;"><div style="color:var(--cyber-pink); font-weight:bold;">■ ${n.title}</div><div style="font-size:0.8rem; color:#ccc; margin-top:5px;">${n.body}</div></div>`).reverse().join(''); document.getElementById('note-content').innerHTML = content || "<p style='color:#666;'>データがありません。</p>"; document.getElementById('note-screen').style.display = 'flex'; }
    function closeNote() { document.getElementById('note-screen').style.display = 'none'; }
    function openLog() { document.getElementById('log-content').innerHTML = chatHistory.map(h => `<div><b style="color:var(--cyber-blue);">${h.name || "システム"}</b>: ${h.text}</div>`).join(''); document.getElementById('log-screen').style.display = 'flex'; }
    function closeLog() { document.getElementById('log-screen').style.display = 'none'; }
    function resetGame() { if(confirm("データをリセットしますか？")) { localStorage.removeItem('cyber_puzzle_save'); window.location.href = window.location.pathname; } }
    function toggleMute() { bgm.muted = !bgm.muted; document.getElementById('mute-btn').innerText = bgm.muted ? "🔇" : "🔊"; }
    function saveGame() { localStorage.setItem('cyber_puzzle_save', JSON.stringify({ step: currentStep, history: chatHistory, notes: unlockedNotes })); }
    function loadGame() { 
        const saved = localStorage.getItem('cyber_puzzle_save'); 
        if (saved) { 
            const data = JSON.parse(saved); 
            currentStep = data.step; 
            chatHistory = data.history || []; 
            unlockedNotes = data.notes || []; 
        } 
    }

    window.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode');
        if (mode === 'after_video' || mode === 'after_game') {
            document.getElementById('title-screen').remove();
            document.getElementById('msg-window').style.display = 'block';
            if (mode === 'after_video') currentStep = 28;
            if (mode === 'after_game') currentStep = 24;
            saveGame();
            showText();
        }
    });

    const scenario = [
        { name: "ハルト", text: "「……OSAKA。ネオンの海と、牙をむくような技術がひしめき合う、僕の街」", bg: "haikei01", chara: "haruto" },
        { name: "ハルト", text: "「こいつは『コドウ』。……ロボット工学の第一人者であるお父さんが、NASAへ行く前に僕に作ってくれた、特別な相棒」", chara: "haruto_kodou" },
        { name: "コドウ", text: "「（和風な電子音で）ドン！ ハルト、今日の調子はどう？」", chara: "kodou" },
        { name: "ハルト", text: "「今日は特別なメンテナンスをして、コドウをパワーアップさせて父さんを驚かせてやるんだ。」", chara: "haruto" },
        { name: "システム", text: "（ハルト、ヘッドホンを装着し、メンテナンスを開始する）", chara: "haruto_kodou" },
        { name: "システム", text: "（画面フラッシュ ＆ エラーSE音演出）", effect: "error" },
        { name: "ハルト", text: "「え……？ コドウ……？ 嘘だろ、待ってよ……！」", chara: "haruto" },
        { name: "謎の男", text: "「……高出力ユニットの負荷テスト……コンマ05の誤差で、これほどのズレが出るとはな。『エネルギー変換効率』を過信しすぎたか。」", chara: "kage" },
        { name: "ハルト", text: "「誰だ！？ コドウに触るな！」", chara: "haruto" },
        { name: "謎の男", text: "「……静かにしてくれ。……急がなければ。」", chara: "kage" },
        { name: "システム", text: "謎の男がコドウを抱え、窓から夜の街へ消えていった" },
        { name: "ハルト", text: "「……そんな, 嘘だろ。……コドウ……. 僕の大事な、たった一人の相棒なのに……」", chara: "haruto" },
        { name: "父の声（回想）", text: "『いいか、ハルト。こいつは世界一のロボットだ。宇宙の果てでも、私とお前を繋いでくれる。……迷子になんて、絶対にならないさ』" },
        { name: "ハルト", text: "「……そうだ。お父さん、言ってたじゃないか。……『迷子にならない』って。」", chara: "haruto" },
        { name: "ハルト", text: "「よし、管理用端末にログインして、……あった！ 高精度GPSユニット！……よしこれで……？！ダメだ、パスワードでロックされている。」", chara: "haruto" },
        { name: "ハルト", text: "「……落ち着け。絶対に, 僕でも辿り着けるように『鍵』を隠してるはずだ。……たしかお父さんの研究ノートに……」", chara: "haruto", note: { id: "n1", title: "父の開発ノート", body: "コドウ内蔵のGPS。ロック解除の鍵がノートの図形に隠されていた。" } },
        { name: "システム", text: "研究ノートを開きパスワードを解明しましょう。", input: { guide: "パスワードを入力してください", ans: "trace" } },
        { name: "ハルト", text: "「……よし、やったぞ！ コドウの信号をキャッチしたぞ。……『OSAKA中央駅』？ あいつ、駅へ向かってるのか！」", effect: "gps", loc: "Neo-Osaka-ST", chara: "haruto" },
        { name: "システム", text: "", bg: "osaka01" },
        { name: "ハルト", text: "「ハァ、ハァ……！ やっと着いた。……って、ゲートが閉まった……！？ くそっ、あいつが強引に突破したせいで……！」", chara: "haruto", bg: "osakaeki01" },
        { name: "駅アナウンス", text: "『警告。システムを警戒モードへ移行します。復旧には管理パスワードが必要です』" },
        { name: "ハルト", text: "「方向は……北。……この先にあるのは, KYOTOか！」", chara: "haruto" },
        { name: "ハルト", text: "「……仕方ない、緊急事態だ！モバイル端末から駅のシステムへアクセスするぞ。…よし、この二つのゲートを突破すれば……」", chara: "haruto", note: { id: "n2", title: "駅の管理パスワード", body: "リニア『ツルギ』を遠隔操作するための父のメモ。" } },
        { name: "システム", text: "セキュリティゲートを突破して、警戒モードを解除しましょう。", jump: "game.html" },
        { name: "ハルト", text: "「……よし、承認された！ システムリブート！ いけ……動けッ！！」", chara: "haruto", bg: "osakaeki01" },
        { name: "システム", text: "", effect: "success" },
        { name: "駅アナウンス", text: "『管理コード承認. ゲートを開きます。機体「ツルギ」、緊急シークエンスを解除. 目的地：KYOTO』", bg: "osakaeki02" },
        { name: "ハルト", text: "「目的地は京都だ。……待ってろよ、コドウ. 必ず, 僕が助け出すから」", chara: "haruto", videoTrigger: true },
        { name: "ハルト", text: "「……ここが、KYOTO. ……この霧, ただの霧じゃない. ナノマシンのノイズだ. GPSが位置を特定できない！」", bg: "kyotoeki01", chara: "haruto" },
        { name: "ハルト", text: "「アイツどこに行ったんだ……」", chara: "haruto" },
        { name: "ドンダー少年", text: "「さっきの太鼓型ロボット、かわいかったなぁ、でもアイツ全然触らせてくれなかったなぁ…」", chara: "boy" },
        { name: "ハルト", text: "「ちょっと君！その男どこに行ったか教えてくれないか？」", chara: "haruto" },
        { name: "ドンダー少年", text: "「え？お兄ちゃんあの男とロボットのこと知ってるの？！教えてあげても良いよ。」", chara: "boy" },
        { name: "ドンダー少年", text: "「ただし、僕の出す謎に答えられたらね！安心して、ドンダーなら簡単だから！」", chara: "boy" },
        { name: "システム", text: "太鼓の謎だドンの冊子を開いて、謎解きをしよう。", input: { guide: "答えを入力してください", ans: "まちかどにたつ" } },
        { name: "ドンダー少年", text: "「正解！ちょっと簡単だったかな. …アイツが向かったのは八百万（やおろず）ジャンクだよ。」", chara: "boy" },
        { name: "ドンダー少年", text: "「今ならまだ間に合うと思うよ。道を聞かれた時に遠回りを教えたから。だってアイツ触らせてくれなかったから」", chara: "boy" },
        { name: "ハルト", text: "「ありがとう！店の名前は『八百万ジャンク』、急ごう！」", chara: "haruto" },
        { name: "システム", text: "八百万ジャンクに到着", bg: "yaorozu01" },
        { name: "ハルト", text: "「はぁ、はぁ……追いついたぞ. ……さあ、コドウを返せ！ 今すぐだ！」", chara: "haruto" },
        { name: "謎の男", text: "「……悪いな. だが, こいつはまだ返せない. 」", chara: "kage" },
        { name: "ハルト", text: "「返せない！？ 勝手なことを言うな！ 僕の相棒だ, お前に触られる筋合いはない！」", chara: "haruto" },
        { name: "謎の男", text: "「そうか？いや、案外そうでも無いかもしれんぞ」", chara: "kage" },
        { name: "ハルト", text: "「は！？ 何言ってんだよ……？ お前, 一体何者なんだ？」", chara: "haruto" },
        { name: "警備ドローン", text: "『……目標発見. ハルト……ハルト・アマツを確認』", effect: "error", chara: "drone" },
        { name: "ハルト", text: "「っ！？ なんだこいつら……！？ なんで, なんで僕の名前を知ってるんだよ！」", chara: "haruto" },
        { name: "ハルト", text: "「……そうか, お前の差し金か. こいつらを使って、僕を待ち伏せしてたのか！」", chara: "haruto" },
        { name: "謎の男", text: "「……そいつらは警備用のドローン『ヤタガラス』だ. 気をつけたほうがいいぜ」", chara: "kage" },
        { name: "謎の男", text: "「弾はゴム製だが, まともに食らえば骨の二, 三本は覚悟しなきゃならない」", chara: "kage" },
        { name: "ハルト", text: "「……っ, 脅しのつもりかよ！ それとも性能を自慢したいだけか！？」", chara: "haruto" },
        { name: "謎の男", text: "「……自慢じゃない. ……事実を言ったまでだ」", chara: "kage" },
        { name: "謎の男", text: "「……すまないが, まだ返せない. ……こいつは連れていく」", chara: "kage" },
        { name: "ハルト", text: "「待て！ 行かせるかよ！」", chara: "haruto" },
        { name: "謎の男", text: "「……取り戻したければ、来い. ……かつて, こいつが生まれた、あの場所に」", chara: "kage" },
        { name: "ハルト", text: "「……っ！？ 『コドウが生まれた場所』……？ 、どういうことだ！？」", chara: "haruto" },
        { name: "謎の男", text: "「……詳しい場所は, そのノートを見れば思い出すはずだ. ……そこで待っている」", chara: "kage" },
        { name: "システム", text: "ヤタガラスと共に, 謎の男が逃走していく", chara: "drone" },
        { name: "ハルト", text: "「……あいつ、ドローンを操ってやがった. ……それにしても……あいつ、一体何が目的なんだ……？」", chara: "haruto" },
        { name: "システム", text: "研究ノートを開いて、研究施設への経路を割り出しましょう。", input: { guide: "ひらがなで入力してください", ans: "かみ" }, note: { id: "n3", title: "八百万の電脳街", body: "京都のジャンク屋で入手した手がかり。" } },
        { name: "ハルト", text: "「そうだ！さっきノートの間から出てきた封筒を開けよう。」", chara: "haruto" },
        { name: "システム", text: "封筒を開けて目的地の正確な座標を求めましょう。", input: { guide: "半角数字で入力してください", ans: "20010221" } },
        { name: "ハルト", text: "「目的地の座標が分かったぞ！端末に座標をセット。…そんなには遠くないぞ。」", chara: "haruto" },
        { name: "ハルト", text: "「……この辺りだ. お父さんの旧・京都研究所. ……間違いない、幼い頃に一度だけ連れてきてもらった、あの風景だ」", bg: "kenkyu01", chara: "haruto" },
        { name: "ハルト", text: "「……それにしても. ……あいつ, どうして『ここ』を知っていたんだ？」", chara: "haruto" },
        { name: "ハルト", text: "「……まさか. ……あれは、お父さん……？ ……いや, そんなはずはない。でも, もしそうなら……どうしてあんな強引な真似を……何か理由があるのか…？」", chara: "haruto" },
        { name: "システム", text: "研究施設へ到着", bg: "kenkyu01" },
        { name: "ハルト", text: "「……誰もいない. ……ハァ, ハァ……！ コドウ! どこだ！ 返事をしてくれ！」", chara: "haruto" },
        { name: "ハルト", text: "「……くそっ, GPSの信号も完全に途切れてる. ……あいつ、僕をからかったのか？」", chara: "haruto" },
        { name: "ハルト", text: "「……全部、僕のせいだ. ……ごごめんな、コドウ」", chara: "haruto" },
        { name: "ハルト", text: "「……お前がいてくれたから、お父さんがいなくても寂しくなかったんだ. ……お前のあの、変な太鼓のリズム……. ……もう一度、聞かせてくれよ……」", chara: "haruto" },
        { name: "システム", text: "ドン！" },
        { name: "ハルト", text: "「……え？ ……この音、まさか……」", chara: "haruto" },
        { name: "コドウ", text: "「ドン！ カカッ！ ……ハルト、遅いよ！ 待ちくたびれちゃった！」", chara: "kodou" },
        { name: "ハルト", text: "「……コドウ！ ……怪我はないか？」", chara: "haruto_kodou" },
        { name: "コドウ", text: "「全然平気！ なんだか体が、前よりずっと軽くなったみたいだよ！」", chara: "kodou" },
        { name: "ハルト", text: "「……よかった. ……本当によかった……！」", chara: "haruto_kodou" },
        { name: "ハルト", text: "「……独自調査を続けていたあの男はどこへ行ったんだ……？」", chara: "haruto" },
        { name: "ハルト", text: "「……なあ、コドウ。あの男はどこへ行った？ あいつ、お前に何をしたんだ！？」", chara: "haruto" },
        { name: "コドウ", text: "「……わかんないよ, ハルト. ……気がついたら、ここでハルトを待ってたんだ…」", chara: "kodou" },
        { name: "ハルト", text: "「……コドウの様子がおかしい。ん…？！……まさか, こいつ……本当に僕の知っている『コドウ』なのか？ 中身を……書き換えられたり、すり替えられたりしてないか……？」", chara: "haruto" },
        { name: "システム", text: "", effect: "error", chara: "drone" },
        { name: "ハルト", text: "「……っ！ しまった、さっきのドローンだ！ やっぱりあいつの仲間が追ってきてたのか！」", chara: "haruto" },
        { name: "ハルト", text: "「……くそっ、考えるのは後だ. コドウ、行くぞ！ ここから出るんだ！」", chara: "haruto_kodou" },
        { name: "コドウ", text: "「……うん、行こう！」", chara: "kodou" },
        { name: "ハルト", text: "「……はぁ, はぁ……！ 上手く逃げ出せたぞ」", bg_png: "teien01", chara: "haruto" },
        { name: "ハルト", text: "「……っ！？ 嘘だろ, あいつ……カゲじゃないか. なんでこんなところに……」", chara: "haruto" },
        { name: "ドローン", text: "『……警告. 抵抗を止め、直ちにあの個体を渡せ. データを差し出せば、命までは取らん』", chara: "drone" },
        { name: "謎の男", text: "「（膝をつき、端末を庇いながら）……断る. ……コドウを, 人殺しの道具には……させない……！」", chara: "kage" },
        { name: "ハルト", text: "「……あいつ、攻撃されてる……？ ドローンの仲間じゃなかったのか」", chara: "haruto" },
        { name: "コドウ", text: "「ドン……. ハルト、お願い, 助けてあげて. ……この人、悪い人じゃないよ」", chara: "kodou" },
        { name: "ハルト", text: "「コドウ……？」", chara: "haruto" },
        { name: "コドウ", text: "「さっきの研究所でね、僕の壊れかけてた回路を, この人が一生懸命直してくれたんだ. お父さんみたいに、ずっと、ずっと優しく……」", chara: "kodou" },
        { name: "ハルト", text: "「そこまでだ！ ……コドウ, いけっ！！」", chara: "haruto_kodou" },
        { name: "謎の男", text: "「……ハルト！？ なぜここに……！ 」", chara: "kage" },
        { name: "ハルト", text: "「たまたま通りかかっただけだよ！ ……借りは返す. コドウがそう言うなら, 信じてやる！」", chara: "haruto" },
        { name: "謎の男", text: "「……フッ. なら、口を動かす前に手を動かせ！俺が時間を稼ぐ. ドローンのセキュリティに侵入して、全機墜落させるんだ！」", chara: "kage" },
        { name: "謎の男", text: "「アマツ博士の研究ノートを見るんだ！ 救助用プロトコル……『モード：アルファ』を強制展開しろ！」", chara: "kage" },
        { name: "ハルト", text: "「（ノートを必死にめくり、コードを叩き込む）モード：アルファ……これか！ よし, いけっ！！」", chara: "haruto", effect: "success" },
        { name: "システム", text: "", chara: "drone" },
        { name: "ハルト", text: "「……止まった！ やったぞ, 墜落しろッ！！」", chara: "haruto" },
        { name: "システム音声（警告）", text: "『警告. 不正なアクセスを検知. 防衛プロトコルが暴走モードへ移行します. 自爆シークエンス開始. 自爆まで残り30分』", effect: "error", chara: "drone" },
        { name: "ハルト", text: "「なっ……！？ 嘘だろ、墜落どころか自爆……！？」", chara: "haruto" },
        { name: "謎の男", text: "「……バカな, モード：アルファが拒絶された……！？まずいぞ、自爆されたら周辺一帯が大惨事になる！」", chara: "kage" },
        { name: "ハルト", text: "「おい、しっかりしてくれよ！ 解除キー、解除キーはどこだ……！？」", chara: "haruto" },
        { name: "システム", text: "研究ノートを見て「ドローンセキュリティの謎」を解明しよう。", input: { guide: "コマンドを入力してください", ans: "さいきどう", onMissStep: 105 } },
        { name: "システム", text: "エラーメッセージ：コマンドが正しくありません。自爆シークエンスが加速します。", effect: "error", chara: "drone" },
        { name: "ハルト", text: "「え？！間違ったということか？！くそっ、もう一度よく見直してみよう」", chara: "haruto", input: { guide: "コマンドを入力してください", ans: "さいきどう" } },
        { name: "システム", text: "（SE：制限時間ギリギリでハルトがキーを入力. ドローンが沈黙する）", effect: "success", chara: "drone" },
        { name: "ハルト", text: "「……はぁ, はぁ……. ……止まった……
」", chara: "haruto" },
        { name: "謎の男", text: "「……フッ. ……よくやったな, ハルト. ……助かったよ」", chara: "kage" },
        { name: "ハルト", text: "「『助かったよ』じゃないだろ！ お前, お父さんのプロトコルが通用するかどうかも分かってなかったのか？」", chara: "haruto" },
        { name: "謎の男", text: "「……いや、完全に俺のミスだ. 博士の設計に、手が加えられてしまっているようだ」", chara: "kage" },
        { name: "ハルト", text: "「詰めが甘いんだよ. しっかりしなよ, エンジニア失格だぞ
」", chara: "haruto" },
        { name: "謎の男", text: "「……そうだな. ……全く、その通りだ. ……手厳しいな、お前は
」", chara: "kage" },
        { name: "ハルト", text: "「本当のことだろ. ……次はもっと、ちゃんとやってくれよ
」", chara: "haruto" },
        { name: "謎の男", text: "「……ああ、そうだな、…約束するよ. だからハルト, お前も今のその言葉、しっかりと覚えておいてくれ. ……『詰めを甘くするな』. ……」", chara: "kage" },
        { name: "システム", text: "―― THE END ――", endingTrigger: true }
    ];
</script>
