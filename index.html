<!DOCTYPE html>
<html lang="ja">
<head>
    <meta name="robots" content="noindex,nofollow">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>音の足跡、記憶の鼓動</title>
    <style>
        :root {
            --cyber-blue: #00f2ff;
            --cyber-pink: #ff0055;
            --wa-indigo: rgba(13, 27, 42, 0.95);
            --bg-black: #050505;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: #ffffff;
            font-family: "Sawarabi Mincho", serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* 📱 スマホ風コンテナ（縦長固定） */
        #game-container {
            position: relative;
            width: 100%;
            max-width: 500px; /* PCで見てもスマホサイズに制限 */
            height: 100%;
            background-color: var(--bg-black);
            display: none; /* パスワード認証後に表示 */
            flex-direction: column;
            border-left: 1px solid #333;
            border-right: 1px solid #333;
            box-sizing: border-box;
        }

        /* 背景・キャラエリア（画面の上半分以上を使用） */
        #bg-area {
            flex: 1; /* 残りのスペースをすべて使う */
            width: 100%;
            background-image: url('img/bg_haruto_room.png'); 
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
        }

        /* 立ち絵：縦長画面に合わせて調整 */
        .chara-stand {
            position: absolute;
            bottom: -5%; /* 少し下に沈めて安定させる */
            left: 50%;
            transform: translateX(-50%);
            height: 85%; /* 縦長なので少し高さを抑える */
            z-index: 2;
            display: none;
            filter: drop-shadow(0 0 15px rgba(0,0,0,0.8));
            pointer-events: none;
        }

        /* メッセージウィンドウ（下部に固定） */
        #msg-window {
            height: 35%; /* スマホで読みやすいよう高めに確保 */
            width: 100%;
            background: var(--wa-indigo);
            border-top: 2px solid var(--cyber-blue);
            padding: 20px;
            box-sizing: border-box;
            cursor: pointer;
            z-index: 5;
            position: relative;
            display: none;
        }

        /* スタイリッシュなマーク（復活版） */
        #speaker-name {
            font-size: 1.1rem;
            color: var(--cyber-blue);
            margin-bottom: 8px;
            font-weight: bold;
            position: relative;
            padding-left: 22px;
        }

        #speaker-name::before {
            content: "▷";
            position: absolute;
            left: 0; top: 50%;
            transform: translateY(-50%);
            text-shadow: 0 0 10px var(--cyber-blue);
        }

        #message-text {
            font-size: 1.05rem;
            line-height: 1.7;
            letter-spacing: 0.05em;
            white-space: pre-wrap;
        }

        /* パスワード・タイトル共通 */
        .overlay-screen {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; background: radial-gradient(circle, #0d1b2a, #000);
            padding: 20px; text-align: center;
        }

        .pw-input {
            background: rgba(0, 242, 255, 0.1); border: 1px solid var(--cyber-blue);
            color: #fff; padding: 12px; font-size: 1.2rem; text-align: center;
            margin-bottom: 20px; width: 80%; outline: none;
        }

        h1 { font-size: 2.2rem; text-shadow: 0 0 15px var(--cyber-blue); margin-bottom: 30px; letter-spacing: 0.2em; }
        
        .btn-cyber { 
            padding: 12px 30px; font-size: 1.1rem; background: transparent; 
            color: var(--cyber-blue); border: 1px solid var(--cyber-blue); 
            cursor: pointer; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%); 
        }

        .flash-red { animation: flash 0.3s ease-out; }
        @keyframes flash { 0% { background-color: rgba(255, 0, 0, 0.7); } 100% { background-color: transparent; } }
    </style>
</head>
<body>

<div id="password-screen" class="overlay-screen">
    <p style="letter-spacing: 0.2em; font-size: 0.8rem; color: var(--cyber-blue);">DEVICE AUTHENTICATION</p>
    <input type="password" id="pw-field" class="pw-input" placeholder="PASSCODE">
    <button class="btn-cyber" onclick="checkPassword()">ENTER</button>
</div>

<div id="game-container">
    <div id="title-screen" class="overlay-screen">
        <h1>音の足跡、<br>記憶の鼓動</h1>
        <button class="btn-cyber" onclick="startGame()">START</button>
    </div>

    <div id="bg-area">
        <div id="effect-layer" style="position:absolute; inset:0; pointer-events:none; z-index:3;"></div>
        <img id="haruto-stand" class="chara-stand" src="img/haruto01.png" alt="Haruto">
        <img id="kage-stand" class="chara-stand" src="img/kage01.png" alt="Kage">
    </div>

    <div id="msg-window" onclick="nextScene()">
        <div id="speaker-name"></div>
        <div id="message-text"></div>
    </div>
</div>

<script>
    const SECRET_KEY = "2026"; 

    function checkPassword() {
        if (document.getElementById('pw-field').value === SECRET_KEY) {
            document.getElementById('password-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
        } else {
            alert("ERROR: 認証に失敗しました");
        }
    }

    const scenario = [
        { name: "ハルト", text: "「……よし。父さんのマニュアル通りなら、これで処理速度が上がるはずだ。……いけっ！」", chara: "haruto", effect: "none" },
        { name: "システム", text: "（画面フラッシュ ＆ エラーSE音演出）", chara: "none", effect: "error" },
        { name: "ハルト", text: "「え……？ コドウ……？ 嘘だろ、待ってよ……！ \nごめん、僕が余計なことを……っ！」", chara: "haruto", effect: "none" },
        { name: "ハルト", text: "「 嘘だろ、待ってよ……！ \nごめん、僕が余計なことを……っ！」", chara: "haruto", effect: "none" },
        { name: "システム", text: "（カゲの立ち絵が登場）", chara: "none", effect: "none" },
        { name: "ハルト", text: "「誰だ！？ コドウに触るな！」", chara: "haruto", effect: "none" },
        { name: "カゲ", text: "「……静かにしてくれ。……急がなければ。」", chara: "kage", effect: "none" },
        { name: "システム", text: "（カゲが消える）", chara: "none", effect: "none" },
        { name: "ハルト", text: "「待てよ！ 返せ！ 泥棒！！ \n……あ、あいつ、メインバッテリーを外したまま連れてった……。\nGPSの信号が消える前に、早く追いかけないと！」", chara: "haruto", effect: "none" }
    ];

    let currentStep = 0;
    let isTyping = false;
    let typingTimer;

    function startGame() {
        document.getElementById('title-screen').style.display = 'none';
        document.getElementById('msg-window').style.display = 'block';
        showText();
    }

    function showText() {
        const data = scenario[currentStep];
        const nameEl = document.getElementById('speaker-name');
        const textEl = document.getElementById('message-text');
        const displayName = (data.name === "システム") ? "" : data.name;
        
        nameEl.innerText = displayName;
        nameEl.style.display = displayName ? "block" : "none";
        textEl.innerText = "";
        isTyping = true;

        updateVisuals(data);

        let i = 0;
        clearInterval(typingTimer);
        typingTimer = setInterval(() => {
            if (i < data.text.length) {
                textEl.innerText += data.text.charAt(i);
                i++;
            } else {
                clearInterval(typingTimer);
                isTyping = false;
            }
        }, 4000 / data.text.length > 50 ? 50 : 30);
    }

    function updateVisuals(data) {
        document.getElementById('haruto-stand').style.display = (data.chara === "haruto") ? "block" : "none";
        document.getElementById('kage-stand').style.display = (data.chara === "kage") ? "block" : "none";
        if (data.effect === "error") {
            const layer = document.getElementById('effect-layer');
            layer.classList.add('flash-red');
            setTimeout(() => layer.classList.remove('flash-red'), 300);
        }
    }

    function nextScene() {
        if (isTyping) {
            clearInterval(typingTimer);
            document.getElementById('message-text').innerText = scenario[currentStep].text;
            isTyping = false;
            return;
        }
        currentStep++;
        if (currentStep < scenario.length) showText();
        else document.getElementById('message-text').innerText = "【第1章・冒頭 完】";
    }
</script>

</body>
</html>
