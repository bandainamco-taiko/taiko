<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Grid Breaker: Audio Synth</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2fe;
            --neon-red: #ff0055;
            --neon-green: #0f0;
            --bg-dark: #000205;
            --font-main: 'Orbitron', sans-serif;
            --font-mono: 'Share Tech Mono', monospace;
        }

        * { box-sizing: border-box; touch-action: none; }

        body {
            margin: 0; padding: 0;
            background-color: #000;
            color: #fff;
            font-family: var(--font-main);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 100vw;
            max-width: 480px;
            height: 100vh;
            background: var(--bg-dark);
            border-left: 1px solid rgba(0, 242, 254, 0.2);
            border-right: 1px solid rgba(0, 242, 254, 0.2);
            overflow: hidden;
        }

        canvas { display: block; }

        .ui {
            position: absolute;
            top: 20px; left: 0; width: 100%;
            display: flex; flex-direction: column;
            gap: 5px;
            padding: 0 20px;
            pointer-events: none;
            z-index: 10;
            font-family: var(--font-mono);
            font-size: 14px;
            color: var(--neon-blue);
        }
        .status-row { display: flex; justify-content: space-between; }

        #p-grid {
            position: absolute;
            bottom: 0; left: 0; width: 0%; height: 2px;
            background: var(--neon-blue);
            box-shadow: 0 0 10px var(--neon-blue);
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 2, 5, 0.95);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 20;
            text-align: center;
            padding: 30px;
        }

        .btn {
            padding: 16px 40px;
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            font-family: var(--font-main);
            cursor: pointer;
            margin-top: 20px;
        }
        
        .hidden { display: none !important; }
        .critical { color: var(--neon-red) !important; }
        .success { color: var(--neon-green) !important; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="ui">
        <div class="status-row">
            <div>TARGET: 300m</div>
            <div>[ <span id="dist">0</span>m ]</div>
        </div>
        <div class="status-row" style="font-size:12px; opacity:0.8;">
            <div>AUDIO: ENABLED</div>
            <div><span id="integrity">100</span>%</div>
        </div>
    </div>
    <div id="p-grid"></div>

    <div id="start-screen" class="overlay">
        <h1>GRID BREAKER</h1>
        <p style="font-size:12px; opacity:0.6;">> BGM SYNTHESIZER READY</p>
        <button class="btn" id="start-btn">BOOT SYSTEM</button>
    </div>

    <div id="dead-screen" class="overlay hidden">
        <h1 class="critical">CONNECTION LOST</h1>
        <button class="btn critical" id="retry-btn">RE-ATTEMPT</button>
    </div>

    <div id="clear-screen" class="overlay hidden">
        <h1 class="success">ACCESS GRANTED</h1>
        <button class="btn success" id="finish-btn">TERMINATE</button>
    </div>

    <canvas id="canvas"></canvas>
</div>

<script>
    // --- オーディオエンジン ---
    let audioCtx = null;
    let mainGain = null;

    function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        mainGain = audioCtx.createGain();
        mainGain.connect(audioCtx.destination);
        mainGain.gain.value = 0.15;
    }

    function playNote(freq, type, duration, volume = 1) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        g.gain.setValueAtTime(volume, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.connect(g);
        g.connect(mainGain);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    // --- ゲーム本体 ---
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('game-container');
    const distDisp = document.getElementById('dist');
    const progressGrid = document.getElementById('p-grid');

    let active = false;
    let distance = 0;
    const GOAL = 300;
    let speed = 4.5;
    let player = { x: 0, y: 0, size: 15, tx: 0, ty: 0 };
    let obstacles = [];
    let frame = 0;

    function init() {
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        player.x = canvas.width / 2;
        player.y = canvas.height * 0.8;
        player.tx = player.x;
        player.ty = player.y;
    }

    class ErrorGrid {
        constructor() {
            this.w = Math.random() * (canvas.width * 0.6) + 40;
            this.h = 18;
            this.x = Math.random() * (canvas.width - this.w);
            this.y = -50;
        }
        update() { this.y += speed; }
        draw() {
            ctx.strokeStyle = '#ff0055';
            ctx.strokeRect(this.x, this.y, this.w, this.h);
            ctx.fillStyle = 'rgba(255, 0, 85, 0.2)';
            ctx.fillRect(this.x, this.y, this.w, this.h);
        }
    }

    function update() {
        if (!active) return;
        frame++;
        distance += 0.15;
        speed = 4.5 + (distance / 50);

        distDisp.innerText = Math.floor(distance);
        progressGrid.style.width = (distance / GOAL * 100) + '%';

        // 動的BGM生成
        let tempo = Math.max(8, 20 - Math.floor(distance / 20));
        if (frame % tempo === 0) {
            const beat = (frame / tempo) % 4;
            const notes = [55, 55, 65, 41];
            playNote(notes[beat], 'square', 0.4, 0.5);
            if (beat === 1 || beat === 3) playNote(100, 'sawtooth', 0.1, 0.2);
        }

        if (distance >= GOAL) { gameClear(); return; }

        player.x += (player.tx - player.x) * 0.2;
        player.y += (player.ty - player.y) * 0.2;

        obstacles.forEach((o) => {
            o.update();
            if (player.x > o.x && player.x < o.x + o.w && player.y > o.y && player.y < o.y + o.h) {
                gameOver();
            }
        });

        if (frame % Math.max(10, 30 - Math.floor(distance/15)) === 0) {
            obstacles.push(new ErrorGrid());
        }
        obstacles = obstacles.filter(o => o.y < canvas.height + 50);
    }

    function draw() {
        ctx.fillStyle = '#000205';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        obstacles.forEach(o => o.draw());

        ctx.save();
        ctx.translate(player.x, player.y);
        ctx.fillStyle = '#fff';
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#00f2fe';
        ctx.beginPath();
        ctx.moveTo(0, -player.size);
        ctx.lineTo(-player.size, player.size);
        ctx.lineTo(player.size, player.size);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
    }

    function loop() {
        update();
        draw();
        if (active) requestAnimationFrame(loop);
    }

    function gameOver() {
        active = false;
        playNote(150, 'sawtooth', 0.5, 1);
        document.getElementById('dead-screen').classList.remove('hidden');
    }

    function gameClear() {
        active = false;
        playNote(440, 'sine', 0.2, 1);
        setTimeout(()=>playNote(880, 'sine', 0.5, 1), 100);
        document.getElementById('clear-screen').classList.remove('hidden');
    }

    function move(e) {
        const rect = canvas.getBoundingClientRect();
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        player.tx = cx - rect.left;
        player.ty = cy - rect.top - 50;
    }

    container.addEventListener('mousemove', move);
    container.addEventListener('touchmove', (e) => { move(e); e.preventDefault(); }, {passive:false});

    document.getElementById('start-btn').onclick = () => { initAudio(); reset(); };
    document.getElementById('retry-btn').onclick = reset;

    // ★ 修正：TERMINATEボタンでクリアフラグを持ってindex.htmlに戻る
    document.getElementById('finish-btn').onclick = () => {
        window.location.href = "index.html?mode=after_game";
    };

    function reset() {
        distance = 0; speed = 4.5; obstacles = []; frame = 0;
        document.querySelectorAll('.overlay').forEach(el => el.classList.add('hidden'));
        init(); active = true; loop();
    }

    init();
</script>
</body>
</html>
