<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LOADING...</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100dvh; background: #050505; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        
        #stage {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block;
        }

        #logo { 
            position: absolute; 
            inset: 0; 
            background: #000 url('img/opening01.jpg') no-repeat center; 
            background-size: cover; 
            display: none; 
            cursor: pointer; 
            opacity: 0; 
            transition: opacity 1.5s ease; 
            z-index: 10;
        }

        #tap-guide {
            position: absolute; inset: 0; display: flex; justify-content: center; align-items: center;
            color: rgba(0, 242, 255, 0.5); font-family: sans-serif; font-size: 0.8rem; letter-spacing: 0.1em;
            z-index: 5; pointer-events: none;
        }

        /* パターンB: PC（横長画面）の時だけ、表示幅を9:16に制限する */
        @media (min-aspect-ratio: 1/1) {
            #stage {
                height: 100dvh;
                aspect-ratio: 9 / 16;
                width: auto;
                box-shadow: 0 0 100px rgba(0,0,0,1), 0 0 20px rgba(0, 242, 255, 0.2);
                border-left: 1px solid rgba(0, 242, 255, 0.1);
                border-right: 1px solid rgba(0, 242, 255, 0.1);
            }
        }
    </style>
</head>
<body>
    <div id="stage">
        <video id="v" src="img/opening.mp4" playsinline webkit-playsinline></video>
        <div id="tap-guide">TAP TO START</div>
        <div id="logo" onclick="location.href='index.html?mode=after_video'"></div>
    </div>

    <script>
        const v = document.getElementById('v'), l = document.getElementById('logo'), g = document.getElementById('tap-guide');
        function startOpening() { g.style.display = 'none'; v.play().catch(showLogo); }
        window.onload = () => {
            v.play().then(() => { g.style.display = 'none'; }).catch(() => {
                window.addEventListener('click', startOpening, { once: true });
            });
        };
        v.onended = showLogo; v.onerror = showLogo;
        function showLogo() { v.style.display = 'none'; g.style.display = 'none'; l.style.display = 'block'; setTimeout(() => l.style.opacity = '1', 100); }
    </script>
</body>
</html>
