<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ワンナイト・リクレイマー</title>
    <style>
        body { margin:0; background:#000; display:flex; justify-content:center; align-items:center; height:100dvh; overflow:hidden; color:#00f2ff; font-family:sans-serif; }
        video { width:100%; height:100%; object-fit:cover; display:none; }
        #start-btn { padding:20px 40px; border:2px solid #00f2ff; cursor:pointer; font-weight:bold; background:rgba(0,242,255,0.1); }
    </style>
</head>
<body>

    <div id="start-btn" onclick="playVideo()">START SYSTEM</div>

    <video id="myVideo" playsinline webkit-playsinline>
        <source src="img/opening.mp4" type="video/mp4">
        お使いのブラウザは動画再生に対応していません。
    </video>

    <script>
        const v = document.getElementById('myVideo');
        const b = document.getElementById('start-btn');

        function playVideo() {
            // ボタンを消して動画を出す
            b.style.display = 'none';
            v.style.display = 'block';

            // 再生命令
            v.play().catch(e => {
                console.error(e);
                alert("再生エラーが発生しました。\nファイル：img/opening.mp4 が存在するか確認してください。");
            });
        }

        // 終わったら次へ
        v.onended = () => { location.href = 'index.html?mode=after_video'; };

        // 読み込みエラーが起きたらすぐ報告
        v.onerror = () => {
            alert("サーバー上の動画ファイルを読み込めません。\nパス間違いか、サーバーの設定（MIMEタイプ）が原因です。");
        };
    </script>
</body>
</html>
