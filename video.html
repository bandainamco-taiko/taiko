<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOADING...</title>
    <style>
        body, html { margin:0; padding:0; width:100%; height:100dvh; background:#000; overflow:hidden; }
        #stage { position:relative; width:100%; height:100%; display:flex; justify-content:center; align-items:center; }
        video { width:100%; height:100%; object-fit:cover; display:none; }
        /* 再生を促すオーバーレイ */
        #play-overlay {
            position:absolute; inset:0; background:rgba(0,0,0,0.9);
            display:flex; flex-direction:column; justify-content:center; align-items:center;
            z-index:100; cursor:pointer;
        }
        .btn-play {
            padding:15px 40px; border:2px solid #00f2ff; color:#00f2ff;
            background:transparent; font-weight:bold; letter-spacing:0.2em;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
        }
    </style>
</head>
<body>
    <div id="stage">
        <div id="play-overlay" onclick="handleStart()">
            <div class="btn-play">PLAY OPENING</div>
            <p style="color:#00f2ff; font-size:0.7rem; margin-top:15px;">タップして再生を開始してください</p>
        </div>
        
        <video id="v" src="img/opening.mp4" playsinline webkit-playsinline preload="auto"></video>
    </div>

    <script>
        const v = document.getElementById('v');
        const overlay = document.getElementById('play-overlay');

        function handleStart() {
            // ユーザーのタップ直後に再生を実行（これで音付きが許可される）
            v.style.display = 'block';
            overlay.style.display = 'none';
            v.play().catch(e => {
                console.error("再生エラー:", e);
                alert("動画が見つからないか、再生できません。URLを確認してください。");
            });
        }

        v.onended = () => { location.href = 'index.html?mode=after_video'; };
    </script>
</body>
</html>
