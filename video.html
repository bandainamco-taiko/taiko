<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LOADING...</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #logo { position: absolute; inset: 0; background: #000 url('img/opening01.png') no-repeat center; background-size: cover; display: none; cursor: pointer; opacity: 0; transition: opacity 1.5s ease; }
    </style>
</head>
<body>
    <video id="v" src="img/opening.mp4" playsinline></video>
    <div id="logo" onclick="location.href='index.html?mode=after_video'"></div>
    <script>
        const v = document.getElementById('v'), l = document.getElementById('logo');
        window.onload = () => { v.play().catch(showLogo); };
        v.onended = showLogo; v.onerror = showLogo;
        function showLogo() { v.style.display='none'; l.style.display='block'; setTimeout(()=>l.style.opacity='1', 100); }
    </script>
</body>
</html>
