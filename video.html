<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LOADING SECTOR...</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #logo-layer {
            position: absolute; inset: 0; background: #000 url('img/opening01.png') no-repeat center;
            background-size: cover; display: none; cursor: pointer; opacity: 0; transition: opacity 1.5s ease; z-index: 10;
        }
    </style>
</head>
<body>
    <video id="v" src="img/opening.mp4" playsinline></video>
    <div id="logo-layer" onclick="goBack()"></div>

    <script>
        const v = document.getElementById('v');
        const l = document.getElementById('logo-layer');

        // ページ読み込み後、少し待って再生開始（ユーザー操作なしでも動く可能性を高めるため）
        window.onload = () => {
            v.play().catch(() => {
                // 自動再生がブロックされたらクリックを促すか、即座にロゴへ
                showLogo();
            });
        };

        v.onended = showLogo;
        v.onerror = showLogo;

        function showLogo() {
            v.style.display = 'none';
            l.style.display = 'block';
            setTimeout(() => l.style.opacity = '1', 100);
        }

        function goBack() {
            // index.htmlに戻る。URLパラメータで「動画終了後」であることを伝える
            window.location.href = "index.html?mode=after_video";
        }
    </script>
</body>
</html>
